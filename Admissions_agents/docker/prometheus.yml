global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "admissions"
    metrics_path: /api/metrics
    scheme: http
    static_configs:
      - targets: ["server:8787"]
    # 如果配了 METRICS_BEARER_TOKEN，需要在这里加上：
    # authorization:
    #   type: Bearer
    #   credentials: your_metrics_token
