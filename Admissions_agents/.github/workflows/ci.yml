name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Admissions_agents/package-lock.json
      - name: Install dependencies
        working-directory: Admissions_agents
        run: npm ci --no-audit --no-fund --ignore-scripts
      - name: Run lint (tsc --noEmit)
        working-directory: Admissions_agents
        run: npm run lint

  docker-build:
    name: Docker 镜像构建（不推送）
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: Admissions_agents
          target: server
          push: false
          tags: admissions-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: Admissions_agents
          target: worker
          push: false
          tags: admissions-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: Admissions_agents
          target: frontend
          push: false
          tags: admissions-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
